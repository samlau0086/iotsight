<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 Not Found | IoTEdges</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, Arial, sans-serif;
        background: #020617;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }

      .shell {
        width: min(720px, 100%);
        border: 1px solid #1e293b;
        background: rgba(15, 23, 42, 0.92);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: #93c5fd;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 16px;
        color: #fff;
        font-size: clamp(32px, 5vw, 52px);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: #94a3b8;
        font-size: 16px;
        line-height: 1.75;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 20px;
        border-radius: 12px;
        text-decoration: none;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .primary {
        background: #f8fafc;
        color: #020617;
      }

      .secondary {
        border: 1px solid #334155;
        color: #e2e8f0;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">404 Not Found</p>
      <h1>This page does not exist</h1>
      <p>The URL may be incorrect, outdated, or no longer available. Continue with the main product, solution, and knowledge pages below.</p>
      <div class="actions">
        <a class="primary" href="/">Back To Home</a>
        <a class="secondary" href="/products">View Products</a>
        <a class="secondary" href="/knowledge">Knowledge Base</a>
      </div>
    </main>
  </body>
</html>

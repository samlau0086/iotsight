              - "Use a site-relative path starting with /, not a full URL."
          - { label: Body Notes, name: body, widget: markdown, required: false, hint: "Internal structured notes for this page content model. The frontend layout stays template-driven." }

  - name: siteCopy
    label: Site Copy
    label_singular: Site Copy File
    delete: false
    editor:
      preview: false
    files:
      - label: Homepage Copy
        name: homepageCopy
        file: src/content/site-copy/homepage.md
        fields:
          - { label: ID, name: id, widget: hidden, default: homepage }
          - { label: Hero Eyebrow, name: heroEyebrow, widget: string }
          - { label: Hero Title, name: heroTitle, widget: string, hint: "Main homepage H1." }
          - { label: Hero Highlight, name: heroHighlight, widget: string, required: false, hint: "Highlighted word or phrase inside the hero title." }
          - { label: Hero Description, name: heroDescription, widget: text }
          - { label: Hero Primary CTA Label, name: heroPrimaryCtaLabel, widget: string }
          - label: Hero Primary CTA Href
            name: heroPrimaryCtaHref
            widget: string
            pattern:
              - '^\/[a-z0-9\-\/]*$'
              - "Use a site-relative path starting with /, not a full URL."
          - { label: Hero Secondary CTA Label, name: heroSecondaryCtaLabel, widget: string }
          - label: Hero Secondary CTA Href
            name: heroSecondaryCtaHref
            widget: string
            pattern:
              - '^\/[a-z0-9\-\/]*$'
              - "Use a site-relative path starting with /, not a full URL."
          - label: Hero Stats
            name: stats
            widget: list
            summary: "{{fields.value}} | {{fields.label}}"
            fields:
              - { label: Value, name: value, widget: string }
              - { label: Label, name: label, widget: string }
          - { label: Trust Eyebrow, name: trustEyebrow, widget: string }
          - label: Trust Pills
            name: trustPills
            widget: list
            field: { label: Text, name: text, widget: string }
          - { label: Problems Title, name: problemsTitle, widget: string }
          - { label: Problems Description, name: problemsDescription, widget: text }
          - label: Problem Cards
            name: problemCards
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - label: Icon Key
                name: iconKey
                widget: select
                options:
                  - { label: Activity, value: "activity" }
                  - { label: Bell, value: "bell" }
                  - { label: Cloud, value: "cloud" }
                  - { label: Server, value: "server" }
                  - { label: Shield Check, value: "shield-check" }
                  - { label: Zap, value: "zap" }
          - { label: Solution Title, name: solutionTitle, widget: string }
          - { label: Solution Description, name: solutionDescription, widget: text }
          - label: Solution Steps
            name: solutionSteps
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Title, name: title, widget: text, hint: "Line breaks are allowed and will render on separate lines." }
              - label: Icon Key
                name: iconKey
                widget: select
                options:

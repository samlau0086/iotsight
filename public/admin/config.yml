              - { label: Description, name: description, widget: text }
              - label: Icon Key
                name: iconKey
                widget: select
                options:
                  - { label: Shield Check, value: "shield-check" }
                  - { label: Cable, value: "cable" }
                  - { label: Radio Tower, value: "radio-tower" }

name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Verify analytics configuration
        env:
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID || secrets.VITE_GA_MEASUREMENT_ID }}
          VITE_GTM_ID: ${{ vars.VITE_GTM_ID || secrets.VITE_GTM_ID }}
        run: |
          if [ -z "$VITE_GTM_ID" ] && [ -z "$VITE_GA_MEASUREMENT_ID" ]; then
            echo "::error::Set VITE_GTM_ID or VITE_GA_MEASUREMENT_ID in GitHub Actions Variables or Secrets before deploying."
            exit 1
          fi

      - name: Build
        env:
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID || secrets.VITE_GA_MEASUREMENT_ID }}
          VITE_GTM_ID: ${{ vars.VITE_GTM_ID || secrets.VITE_GTM_ID }}
        run: npm run build

      - name: Verify prerendered product pages
        run: |
          test -f dist/products/index.html
          test -f dist/products/ieg-100-ethernet-industrial-iot-gateway/index.html
          test -f dist/products/ieio-100-modbus-remote-io-module/index.html
          test -f dist/products/ier-100-ethernet-industrial-rtu/index.html
          test -f dist/products/ieg-120-wifi-industrial-iot-gateway/index.html
          test -f dist/products/ier-120-wifi-remote-monitoring-rtu/index.html
          test -f dist/products/ieac-140-4g-gsm-gate-opener/index.html
          grep -q "IEG-100 Ethernet Industrial IoT Gateway" dist/products/ieg-100-ethernet-industrial-iot-gateway/index.html
          grep -q "IEIO-100 Modbus Remote IO Module" dist/products/ieio-100-modbus-remote-io-module/index.html
          grep -q "IER-100 Ethernet Industrial RTU" dist/products/ier-100-ethernet-industrial-rtu/index.html
          grep -q "IEG-120 WiFi Industrial IoT Gateway" dist/products/ieg-120-wifi-industrial-iot-gateway/index.html
          grep -q "IER-120 WiFi Remote Monitoring RTU" dist/products/ier-120-wifi-remote-monitoring-rtu/index.html
          grep -q "IEAC-140 4G GSM Gate Opener" dist/products/ieac-140-4g-gsm-gate-opener/index.html

      - name: Verify prerendered solution pages
        run: |
          test -f dist/solutions/gate-access-control/index.html
          grep -q "Gate Access Control" dist/solutions/gate-access-control/index.html

      - name: Verify prerendered knowledge pages
        run: |
          test -f dist/knowledge/index.html
          test -f dist/knowledge/modbus/index.html
          test -f dist/knowledge/mqtt/index.html
          test -f dist/knowledge/rs485/index.html
          test -f dist/knowledge/4g-gsm-gate-opener-europe/index.html
          grep -q "Modbus for Industrial IoT Gateways and RTUs" dist/knowledge/modbus/index.html
          grep -q "MQTT in Industrial IoT Monitoring" dist/knowledge/mqtt/index.html
          grep -q "RS485 Wiring for Modbus RTU Devices" dist/knowledge/rs485/index.html
          grep -q "GSM vs 4G Gate Opener for Europe" dist/knowledge/4g-gsm-gate-opener-europe/index.html

      - name: Verify prerendered blog pages
        run: |
          test -f dist/blog/how-to-choose-4g-gate-opener-europe/index.html
          grep -q "How to Choose a 4G Gate Opener for Europe" dist/blog/how-to-choose-4g-gate-opener-europe/index.html

      - name: Verify SEO discovery files
        env:
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID || secrets.VITE_GA_MEASUREMENT_ID }}
          VITE_GTM_ID: ${{ vars.VITE_GTM_ID || secrets.VITE_GTM_ID }}
        run: |
          test -f dist/sitemap.xml
          test -f dist/robots.txt
          grep -q "https://iotedges.com/products/ieg-100-ethernet-industrial-iot-gateway" dist/sitemap.xml
          grep -q "https://iotedges.com/products/ieac-140-4g-gsm-gate-opener" dist/sitemap.xml
          grep -q "https://iotedges.com/knowledge/modbus" dist/sitemap.xml
          grep -q "https://iotedges.com/knowledge/4g-gsm-gate-opener-europe" dist/sitemap.xml
          grep -q "https://iotedges.com/blog/how-to-choose-4g-gate-opener-europe" dist/sitemap.xml
          grep -q "Sitemap: https://iotedges.com/sitemap.xml" dist/robots.txt
          grep -q "application/ld+json" dist/products/ieg-100-ethernet-industrial-iot-gateway/index.html
          grep -q "application/ld+json" dist/knowledge/modbus/index.html
          if [ -n "$VITE_GTM_ID" ]; then
            grep -Fq "www.googletagmanager.com/gtm.js?id=" dist/index.html
            grep -Fq "$VITE_GTM_ID" dist/index.html
            grep -Fq "www.googletagmanager.com/ns.html?id=$VITE_GTM_ID" dist/index.html
          fi
          if [ -n "$VITE_GA_MEASUREMENT_ID" ]; then
            grep -Fq "www.googletagmanager.com/gtag/js?id=$VITE_GA_MEASUREMENT_ID" dist/index.html
            grep -Fq "gtag('config','$VITE_GA_MEASUREMENT_ID')" dist/index.html
          fi

      - name: Package release
        run: |
          mkdir release
          cp package.json package-lock.json ecosystem.config.cjs release/
          cp -r dist release/
          tar -czf release.tar.gz -C release .

      - name: Prepare production env
        env:
          APP_URL: ${{ secrets.APP_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LIVE_CHAT_API_BASE_URL: ${{ secrets.LIVE_CHAT_API_BASE_URL }}
          LIVE_CHAT_API_TOKEN: ${{ secrets.LIVE_CHAT_API_TOKEN }}
          PORT: ${{ vars.PORT }}
        run: |
          write_env() {
            key="$1"
            value="$2"
            escaped=$(printf "%s" "$value" | sed "s/'/'\\\\''/g")
            printf "%s='%s'\n" "$key" "$escaped"
          }

          {
            echo "NODE_ENV=production"
            write_env "PORT" "${PORT:-3005}"
            if [ -n "$APP_URL" ]; then write_env "APP_URL" "$APP_URL"; fi
            if [ -n "$GEMINI_API_KEY" ]; then write_env "GEMINI_API_KEY" "$GEMINI_API_KEY"; fi
            if [ -n "$LIVE_CHAT_API_BASE_URL" ]; then write_env "LIVE_CHAT_API_BASE_URL" "$LIVE_CHAT_API_BASE_URL"; fi
            if [ -n "$LIVE_CHAT_API_TOKEN" ]; then write_env "LIVE_CHAT_API_TOKEN" "$LIVE_CHAT_API_TOKEN"; fi
          } > .env.production

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          test -n "$VPS_USER"
          DEPLOY_PATH="${VPS_DEPLOY_PATH:-/var/www/iotedges}"
          ssh -i ~/.ssh/deploy_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/deploy_key -P "${VPS_PORT:-22}" release.tar.gz "$VPS_USER@$VPS_HOST:$DEPLOY_PATH/release.tar.gz"
          scp -i ~/.ssh/deploy_key -P "${VPS_PORT:-22}" .env.production "$VPS_USER@$VPS_HOST:$DEPLOY_PATH/.env.production"

      - name: Install and restart on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          DEPLOY_PATH="${VPS_DEPLOY_PATH:-/var/www/iotedges}"
          ssh -i ~/.ssh/deploy_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          rm -rf dist
          tar -xzf release.tar.gz
          rm release.tar.gz
          mv .env.production .env
          chmod 600 .env
          npm ci --omit=dev
          if command -v pm2 >/dev/null 2>&1; then
            pm2 startOrReload ecosystem.config.cjs --env production
            pm2 save
          else
            npm install -g pm2
            pm2 start ecosystem.config.cjs --env production
            pm2 save
          fi
          EOF
